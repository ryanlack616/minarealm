<?xml version="1.0" encoding="UTF-8"?>
<!--
  ROCK SHOP — Minarealm Storefront Sign
  Dimensions: 10 ft wide × 2 ft tall  (5:1 aspect ratio)
  viewBox: 2000 × 400 units  →  1 unit = 0.06"  →  scale to any print size

  PRINTER NOTES:
  • Convert all text to outlines before production (Object → Expand in Illustrator)
  • Background is deep charcoal — specify "print background colour" to printer
  • Suitable for large-format vinyl banner, dibond, or HDU sign substrate
  • No gradients — all flat vector, CMYK-safe
  • Recommended: minimum 100dpi output at final 10ft width
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 2000 400"
     shape-rendering="geometricPrecision"
     text-rendering="geometricPrecision">

  <title>ROCK SHOP — Minarealm Storefront Sign</title>

  <!-- ═══════════════════════════════════════════
       BACKGROUND
  ═══════════════════════════════════════════ -->
  <rect width="2000" height="400" fill="#1a1820"/>

  <!-- Outer gold border — double rule -->
  <rect x="7"  y="7"  width="1986" height="386" fill="none" stroke="#c8962a" stroke-width="4"/>
  <rect x="14" y="14" width="1972" height="372" fill="none" stroke="#c8962a" stroke-width="1" opacity="0.45"/>

  <!-- ═══════════════════════════════════════════
       LEFT CRYSTAL CLUSTER  (x: 0 – 380)
       Palette: amethyst purples, mineral blue, turquoise
  ═══════════════════════════════════════════ -->

  <!-- Ground shadow ellipse -->
  <ellipse cx="198" cy="394" rx="196" ry="10" fill="#090810"/>

  <!-- Back-layer shadow crystals (depth/overlap) -->
  <polygon points="162,190  172,252  175,396  148,396  150,252" fill="#28103e"/>
  <polygon points="238,202  246,258  248,396  225,396  227,258" fill="#28103e"/>

  <!-- C1 · King amethyst — tallest, centre of cluster -->
  <polygon points="196,24   238,162  247,396  145,396  154,162" fill="#6a2594"/>
  <!-- Left highlight facet -->
  <polygon points="196,24   154,162  196,188" fill="#c39bd3"/>
  <!-- Right highlight facet -->
  <polygon points="196,24   238,162  216,182" fill="#9b59b6"/>

  <!-- C2 · Left tall amethyst -->
  <polygon points="108,58   140,180  148,396   80,396   88,180" fill="#5b2082"/>
  <polygon points="108,58    88,180  108,196" fill="#a569bd"/>

  <!-- C3 · Right amethyst -->
  <polygon points="272,62   300,185  307,396  240,396  246,185" fill="#7b37a8"/>
  <polygon points="272,62   246,185  272,200" fill="#8e44ad"/>

  <!-- C4 · Far-left dark stub -->
  <polygon points="46,145    60,228   65,396   28,396   33,228" fill="#390f4e"/>
  <polygon points="46,145    33,228   46,234"  fill="#6c3483"/>

  <!-- C5 · Mid-left dark stub -->
  <polygon points="74,155    86,232   91,396   58,396   62,232" fill="#4a1868"/>
  <polygon points="74,155    62,232   74,238"  fill="#7d3c98"/>

  <!-- C6 · Mineral blue accent (right edge of cluster) -->
  <polygon points="330,88   354,215  360,396  303,396  308,215" fill="#14496a"/>
  <polygon points="330,88   308,215  330,226" fill="#2471a3"/>

  <!-- C7 · Turquoise small crystal (far right) -->
  <polygon points="356,162  367,240  371,396  341,396  345,240" fill="#0c6b5e"/>
  <polygon points="356,162  345,240  356,246" fill="#17a589"/>

  <!-- Base fragment crystals — litter at ground line -->
  <polygon points="96,318   104,360  107,396   84,396   87,360" fill="#7d3c98" opacity="0.72"/>
  <polygon points="245,310  253,355  256,396  233,396  236,355" fill="#8e44ad" opacity="0.70"/>
  <polygon points="22,265    28,320   31,396   12,396   14,320" fill="#390f4e" opacity="0.60"/>
  <polygon points="305,322  313,362  316,396  295,396  298,362" fill="#2471a3" opacity="0.62"/>
  <polygon points="168,332  175,368  177,396  159,396  161,368" fill="#17a589" opacity="0.52"/>
  <polygon points="348,346  354,374  356,396  341,396  343,374" fill="#17a589" opacity="0.42"/>

  <!-- Tiny mineral flecks at ground -->
  <polygon points="128,358  132,376  134,396  122,396  124,376" fill="#a569bd" opacity="0.38"/>
  <polygon points="260,348  265,370  267,396  255,396  257,370" fill="#2471a3" opacity="0.35"/>

  <!-- ═══════════════════════════════════════════
       RIGHT CRYSTAL CLUSTER  (x: 1620 – 2000)
       Palette: quartz white/grey, agate orange, mineral blue, copper
  ═══════════════════════════════════════════ -->

  <!-- Ground shadow ellipse -->
  <ellipse cx="1802" cy="394" rx="196" ry="10" fill="#090810"/>

  <!-- Back-layer shadow crystals -->
  <polygon points="1838,192  1848,254  1850,396  1825,396  1827,254" fill="#252f3a"/>
  <polygon points="1762,205  1770,260  1772,396  1749,396  1751,260" fill="#252f3a"/>

  <!-- R1 · King quartz — tallest, centre of cluster -->
  <polygon points="1804,24  1846,162  1854,396  1754,396  1762,162" fill="#b5c0c8"/>
  <!-- Left highlight facet (light from right) -->
  <polygon points="1804,24  1762,162  1804,188" fill="#ecf0f1"/>
  <!-- Right mid facet -->
  <polygon points="1804,24  1846,162  1822,184" fill="#d5dbdb"/>

  <!-- R2 · Left agate orange -->
  <polygon points="1718,58  1748,182  1755,396  1682,396  1688,182" fill="#9e3a05"/>
  <polygon points="1718,58  1688,182  1718,196" fill="#e8782a"/>

  <!-- R3 · Right mineral blue -->
  <polygon points="1892,62  1918,188  1924,396  1860,396  1866,188" fill="#1a5276"/>
  <polygon points="1892,62  1866,188  1892,204" fill="#2980b9"/>

  <!-- R4 · Far-right pale quartz -->
  <polygon points="1956,145  1974,228  1979,396  1933,396  1937,228" fill="#aab7bc"/>
  <polygon points="1956,145  1937,228  1956,236" fill="#d6e4ea"/>

  <!-- R5 · Far-left copper -->
  <polygon points="1668,88  1690,215  1695,396  1637,396  1642,215" fill="#5d2d07"/>
  <polygon points="1668,88  1642,215  1668,228" fill="#ba6a1c"/>

  <!-- R6 · Small copper stub (left of copper) -->
  <polygon points="1645,155  1655,232  1659,396  1628,396  1631,232" fill="#4e2408"/>
  <polygon points="1645,155  1631,232  1645,238" fill="#9a5518"/>

  <!-- R7 · Turquoise accent far right -->
  <polygon points="1976,168  1987,244  1990,396  1962,396  1965,244" fill="#0c6b5e"/>
  <polygon points="1976,168  1965,244  1976,250" fill="#17a589"/>

  <!-- R8 · Small blue stub (inner right) -->
  <polygon points="1930,158  1942,234  1946,396  1912,396  1915,234" fill="#1a6285"/>
  <polygon points="1930,158  1915,234  1930,240" fill="#2e86c1"/>

  <!-- Base fragment crystals -->
  <polygon points="1688,316  1696,360  1699,396  1676,396  1679,360" fill="#e8782a" opacity="0.72"/>
  <polygon points="1860,306  1868,352  1871,396  1848,396  1851,352" fill="#2980b9" opacity="0.70"/>
  <polygon points="1968,260  1975,318  1978,396  1959,396  1961,318" fill="#aab7bc" opacity="0.62"/>
  <polygon points="1752,325  1760,362  1763,396  1742,396  1745,362" fill="#ba6a1c" opacity="0.65"/>
  <polygon points="1832,336  1839,370  1841,396  1823,396  1825,370" fill="#17a589" opacity="0.52"/>
  <polygon points="1643,280  1649,330  1652,396  1633,396  1636,330" fill="#4e2408" opacity="0.50"/>

  <!-- Tiny mineral flecks -->
  <polygon points="1872,354  1876,374  1878,396  1867,396  1868,374" fill="#17a589" opacity="0.38"/>
  <polygon points="1740,350  1745,372  1747,396  1735,396  1737,372" fill="#2e86c1" opacity="0.36"/>

  <!-- ═══════════════════════════════════════════
       CENTRE TEXT AREA  (x: 380 – 1620)
  ═══════════════════════════════════════════ -->

  <!-- Decorative gold rule tabs flanking text (far edges) -->
  <line x1="386" y1="200" x2="438" y2="200" stroke="#c8962a" stroke-width="1.5" opacity="0.50"/>
  <line x1="1562" y1="200" x2="1614" y2="200" stroke="#c8962a" stroke-width="1.5" opacity="0.50"/>

  <!-- ─── PRIMARY TEXT: ROCK SHOP ─── -->
  <text x="1000" y="244"
        font-family="'Arial Black', 'Franklin Gothic Heavy', 'Oswald', Impact, sans-serif"
        font-size="180"
        font-weight="900"
        fill="#FFFFFF"
        text-anchor="middle"
        letter-spacing="5">ROCK SHOP</text>

  <!-- ─── Horizontal divider with diamond gem accents ─── -->
  <!-- Left rule segment -->
  <line x1="416" y1="270" x2="556" y2="270" stroke="#c8962a" stroke-width="2"   opacity="0.78"/>
  <!-- Centre faint rule -->
  <line x1="590" y1="270" x2="1410" y2="270" stroke="#c8962a" stroke-width="0.8" opacity="0.22"/>
  <!-- Right rule segment -->
  <line x1="1444" y1="270" x2="1584" y2="270" stroke="#c8962a" stroke-width="2"   opacity="0.78"/>

  <!-- Left diamond gem -->
  <polygon points="560,270  570,260  580,270  570,280" fill="#c8962a"/>
  <!-- Right diamond gem -->
  <polygon points="1420,270  1430,260  1440,270  1430,280" fill="#c8962a"/>
  <!-- Centre micro diamond -->
  <polygon points="997,266  1003,260  1009,266  1003,272" fill="#c8962a" opacity="0.38"/>

  <!-- ─── SECONDARY TEXT ─── -->
  <text x="1000" y="324"
        font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif"
        font-size="38"
        font-weight="400"
        fill="#c8962a"
        text-anchor="middle"
        letter-spacing="4">Crystals  ·  Minerals  ·  Fossils  ·  Geodes</text>

  <!-- Corner accent diamonds (inside border, four corners of text block) -->
  <polygon points="410,270  418,262  426,270  418,278" fill="#c8962a" opacity="0.52"/>
  <polygon points="1574,270  1582,262  1590,270  1582,278" fill="#c8962a" opacity="0.52"/>

</svg>
