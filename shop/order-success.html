<!DOCTYPE html>
<html lang="en">
<head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-6M44R4WB73"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-6M44R4WB73');

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0c0b10">
<title>Order Confirmed · Minarealm Crystals</title>
<link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
<style>
  :root{
    --bg:#0c0b10;--surface:#14121c;--surface2:#1c1926;
    --gold:#d4a94a;--gold-light:#e8c570;--gold-dim:#8a6d30;
    --purple:#7c5cbf;--text:#e8e4d6;--text-dim:#9a9080;
    --border:#2a2535;--nav-bg:rgba(12,11,16,.96);--radius:4px;
    --success:#4ac29a;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--text);font-family:Georgia,'Times New Roman',serif;line-height:1.6;min-height:100vh}
  a{color:var(--gold);text-decoration:none}
  a:hover{color:var(--gold-light);text-decoration:underline}

  nav{position:sticky;top:0;z-index:100;background:var(--nav-bg);backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border);padding:0 40px;display:flex;align-items:center;
    justify-content:space-between;height:64px}
  .nav-logo{font-size:1.4rem;color:var(--gold);letter-spacing:.02em;font-weight:500}
  .nav-logo span{display:block;font-size:.65rem;color:var(--text-dim);letter-spacing:.2em;text-transform:uppercase}

  main{max-width:560px;margin:0 auto;padding:64px 24px 80px}

  .icon{font-size:3rem;margin-bottom:16px;display:block;text-align:center}
  h1{font-size:1.6rem;font-weight:500;text-align:center;color:var(--gold);margin-bottom:8px}
  .sub{text-align:center;color:var(--text-dim);font-size:.95rem;margin-bottom:40px}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:24px;margin-bottom:20px}
  .card h2{font-size:.75rem;text-transform:uppercase;letter-spacing:.15em;color:var(--text-dim);font-weight:700;margin-bottom:14px}
  .row{display:flex;justify-content:space-between;align-items:baseline;padding:6px 0;border-bottom:1px solid var(--border);font-size:.95rem}
  .row:last-child{border-bottom:none}
  .label{color:var(--text-dim);font-size:.9rem}
  .value{text-align:right}

  .item-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:.9rem}
  .item-row:last-child{border-bottom:none}
  .item-name{flex:1;padding-right:12px}
  .item-amt{color:var(--text-dim)}

  .total-row{display:flex;justify-content:space-between;padding:8px 0;font-size:.95rem}
  .total-row.grand{font-weight:700;color:var(--gold);font-size:1.05rem;border-top:1px solid var(--border);margin-top:4px;padding-top:12px}

  .address-block{font-size:.9rem;line-height:1.8;color:var(--text)}

  .notice{background:rgba(74,194,154,.07);border:1px solid rgba(74,194,154,.25);border-radius:6px;padding:16px 20px;font-size:.88rem;color:var(--text);line-height:1.7;margin-bottom:20px}

  .actions{display:flex;flex-direction:column;gap:12px;margin-top:32px}
  .btn{display:block;text-align:center;padding:14px 24px;border-radius:var(--radius);font-family:inherit;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .2s;text-decoration:none}
  .btn-primary{background:var(--gold);color:#0c0b10}
  .btn-primary:hover{background:var(--gold-light);text-decoration:none}
  .btn-secondary{background:none;border:1px solid var(--border);color:var(--text-dim)}
  .btn-secondary:hover{border-color:var(--gold);color:var(--gold);text-decoration:none}

  .loading{text-align:center;color:var(--text-dim);padding:80px 0;font-size:.95rem}
  .error-msg{text-align:center;color:#c24a4a;padding:80px 0}

  .status-badge{display:inline-block;font-size:.75rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 10px;border-radius:12px;margin-left:8px}
  .status-paid{background:rgba(74,194,154,.15);color:var(--success)}
  .status-pending{background:rgba(212,169,74,.12);color:var(--gold)}

  @media(max-width:600px){
    nav{padding:0 16px}
    main{padding:40px 16px 60px}
  }
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">
    Minarealm
    <span>Crystals &amp; Minerals</span>
  </a>
  <a href="/shop/" style="color:var(--text-dim);font-size:.9rem">← Back to shop</a>
</nav>

<main id="main">
  <div class="loading" id="loading">Loading your order…</div>
</main>

<script>
const API = 'https://minarealm-admin.minarealm.workers.dev';
const money = n => '$' + Number(n).toFixed(2);
function escHtml(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function getOrderId(){
  const params = new URLSearchParams(location.search);
  return params.get('orderId') || '';
}

function renderError(msg){
  document.getElementById('main').innerHTML =
    `<div class="error-msg"><p style="font-size:1.5rem;margin-bottom:12px">⚠</p><p>${msg}</p><div class="actions"><a href="/shop/" class="btn btn-primary">Return to shop</a></div></div>`;
}

function renderOrder(order){
  const isPaid = order.paymentStatus === 'paid';
  const isShip = String(order.fulfillment || '').toLowerCase().includes('ship');
  const addr = order.shippingAddress || {};

  const itemsHtml = (order.lines || []).map(l =>
    `<div class="item-row">
      <span class="item-name">${escHtml(l.name)} <span style="color:var(--text-dim)">×${escHtml(l.qty)}</span></span>
      <span class="item-amt">${money(l.price * l.qty)}</span>
    </div>`
  ).join('');

  const fin = order.financial || {};
  const totalsHtml = [
    `<div class="total-row"><span class="label">Subtotal</span><span>${money(fin.subtotal||0)}</span></div>`,
    fin.shipping > 0
      ? `<div class="total-row"><span class="label">Shipping</span><span>${money(fin.shipping)}</span></div>`
      : `<div class="total-row"><span class="label">Shipping</span><span style="color:var(--success)">FREE</span></div>`,
    fin.tax > 0
      ? `<div class="total-row"><span class="label">MI Sales Tax (6%)</span><span>${money(fin.tax)}</span></div>`
      : null,
    `<div class="total-row grand"><span>Total</span><span>${money(fin.total||0)}</span></div>`
  ].filter(Boolean).join('');

  const statusBadge = isPaid
    ? `<span class="status-badge status-paid">Paid</span>`
    : `<span class="status-badge status-pending">Confirming payment…</span>`;

  const addrHtml = isShip && addr.line1 ? `
    <div class="card">
      <h2>Ship to</h2>
      <div class="address-block">
        ${[addr.name, addr.line1, addr.line2, `${escHtml(addr.city)}, ${escHtml(addr.state)} ${escHtml(addr.zip)}`].filter(Boolean).map(escHtml).join('<br>')}
      </div>
    </div>` : '';

  const noticeHtml = isShip
    ? `<div class="notice">We'll email you at <strong>${escHtml(order.customer.email)}</strong> with a USPS tracking number once your order ships — usually within 1–2 business days.</div>`
    : `<div class="notice">Cynthia will reach out to confirm pickup time at your chosen location.</div>`;

  document.getElementById('main').innerHTML = `
    <span class="icon">✨</span>
    <h1>Order confirmed ${statusBadge}</h1>
    <p class="sub">Order #${escHtml(order.id)} &nbsp;·&nbsp; ${new Date(order.created).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}</p>

    ${noticeHtml}

    <div class="card">
      <h2>Your items</h2>
      ${itemsHtml}
      <div style="margin-top:12px">${totalsHtml}</div>
    </div>

    <div class="card">
      <h2>Order details</h2>
      <div class="row"><span class="label">Name</span><span class="value">${escHtml(order.customer.name)}</span></div>
      <div class="row"><span class="label">Email</span><span class="value">${escHtml(order.customer.email)}</span></div>
      <div class="row"><span class="label">Fulfillment</span><span class="value">${escHtml(order.fulfillment)}</span></div>
    </div>

    ${addrHtml}

    <div class="actions">
      <a href="/shop/" class="btn btn-primary">Continue shopping</a>
      <a href="/" class="btn btn-secondary">Return home</a>
    </div>`;

  // Poll for payment confirmation (webhook is async — retry up to ~20s)
  if(!isPaid){
    let attempts = 0;
    const poll = setInterval(async () => {
      attempts++;
      if(attempts > 8){ clearInterval(poll); return; }
      try {
        const updated = await fetchOrder(order.id);
        if(updated && updated.paymentStatus === 'paid'){
          clearInterval(poll);
          renderOrder(updated);
        }
      } catch(_){}
    }, 2500);
  }
}

async function fetchOrder(orderId){
  const r = await fetch(`${API}/api/orders/${encodeURIComponent(orderId)}/confirmation`, { cache: 'no-store' });
  if(r.status === 404) return null;
  if(!r.ok) throw new Error('Server error ' + r.status);
  return r.json();
}

async function init(){
  const orderId = getOrderId();
  if(!orderId){
    renderError('No order ID found. Check the URL or <a href="/shop/">return to the shop</a>.');
    return;
  }
  try {
    const order = await fetchOrder(orderId);
    if(order === null){
      renderError('Order not found. It may still be processing — check your email for a confirmation from Square, or <a href="/shop/">return to the shop</a>.');
      return;
    }
    renderOrder(order);

    // Square webhooks are async — if payment is pending, poll until paid (max ~45s)
    if(order.paymentStatus !== 'paid'){
      let tries = 0;
      const poll = async () => {
        tries++;
        try {
          const fresh = await fetchOrder(orderId);
          if(fresh && fresh.paymentStatus === 'paid'){ renderOrder(fresh); return; }
        } catch(_){}
        if(tries < 15) setTimeout(poll, 3000);
      };
      setTimeout(poll, 3000);
    }
  } catch(e){
    renderError('Could not load your order. Please check your email for a confirmation from Square, or <a href="/">return home</a>.');
  }
}

init();
</script>
</body>
</html>
