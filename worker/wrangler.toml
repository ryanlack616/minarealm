name = "minarealm-admin"
main = "src/index.js"
compatibility_date = "2025-12-01"

# R2 bucket for product photos
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "minarealm-images"

# KV for catalog + sessions + orders
[[kv_namespaces]]
binding = "STORE"
id = "0696a03269e14723ba616e885e6144e9"

# Public URL for R2 (set after enabling r2.dev access OR custom domain)
[vars]
PUBLIC_IMAGE_BASE = "https://pub-8d9037b9df7a4082ab5ace47eb40f7de.r2.dev"
ALLOWED_ORIGIN = "https://minarealm.shop"
NOTIFY_EMAIL = "cynthia@minarealm.org"
SQUARE_ENV = "sandbox"
FREE_SHIPPING_THRESHOLD = "100"
DAILY_CAP = "500"

# Secrets (set via wrangler secret put):
# ADMIN_PASSWORD
# SQUARE_ACCESS_TOKEN
# SQUARE_WEBHOOK_SIGNATURE_KEY
# SQUARE_LOCATION_ID
# RESEND_API_KEY            (optional) enables reliable transactional email via Resend.
#                           Without it, the worker falls back to MailChannels (free Workers
#                           tier ended 2024 — likely undelivered). Set EMAIL_FROM below to a
#                           Resend-verified sender on a domain you control.
# EMAIL_FROM = "orders@minarealm.shop"   # add under [vars] once the domain is verified in Resend
